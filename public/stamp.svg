<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="stamp-texture" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#7A0016" stroke-width="4" opacity="0.85"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#7A0016" stroke-width="2" opacity="0.85"/>
  <text x="100" y="55" text-anchor="middle" fill="#7A0016" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" opacity="0.85">ORIGINAL</text>
  <text x="100" y="115" text-anchor="middle" fill="#7A0016" font-family="Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="1" opacity="0.85">ISSUED</text>
  <text x="100" y="145" text-anchor="middle" fill="#7A0016" font-family="Arial, sans-serif" font-size="9" font-weight="600" letter-spacing="1.5" opacity="0.75">BILOOP TECHNOLOGY</text>
  <path id="topArc" d="M 35 100 A 65 65 0 0 1 165 100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#7A0016" opacity="0.8" letter-spacing="2">
